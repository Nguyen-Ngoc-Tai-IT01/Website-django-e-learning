{% extends 'base.html' %} 
{% block title %}Đọc: {{ document.title }} | E-Learning{% endblock %} 

{% block content %}
<div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col h-[calc(100vh-5rem)]">

  <!-- Header giống Lesson -->
  <div class="mb-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shrink-0">
    <div>
      <h1 class="text-2xl font-bold text-white">{{ document.title }}</h1>
      <p class="text-slate-400 text-sm mt-1">Đang xem trực tuyến</p>
    </div>

    <div class="flex items-center gap-3">
      <a href="{{ document.file.url }}" 
         download
         class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl text-sm font-medium transition-colors border border-slate-700 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
        </svg>
        Tải file
      </a>
      <a href="{% url 'courses:document_list' %}" 
         class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-medium transition-colors shadow-lg shadow-blue-500/20">
        Đóng & Quay lại
      </a>
    </div>
  </div>

  <!-- Khung hiển thị tài liệu - giống hệt phần PDF trong Lesson -->
  <div class="w-full flex-grow bg-slate-900 rounded-2xl border border-slate-700/50 overflow-hidden shadow-2xl relative">
    
    <object data="{{ document.file.url }}" 
            type="application/pdf"
            class="w-full h-full absolute inset-0 border-0">
      
      <!-- Fallback khi không phải PDF (.docx, .doc, .pptx...) -->
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-10 bg-slate-900">
        <div class="w-28 h-28 bg-slate-800 rounded-3xl flex items-center justify-center mb-8">
          <svg class="w-20 h-20 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
                  d="M19 21V5a2 2 0 01-2-2H7a2 2 0 01-2 2v16m14 0h-4m-6 0H5"></path>
          </svg>
        </div>
        <h3 class="text-2xl font-semibold text-white mb-3">Không hỗ trợ xem trực tuyến</h3>
        <p class="text-slate-400 max-w-md mb-8 text-lg">
          File này là <span class="font-medium text-slate-200">{{ document.file.name|slice:"-5:"|upper }}</span>.<br>
          Vui lòng tải xuống để xem bằng Microsoft Word hoặc Google Docs.
        </p>
        
        <a href="{{ document.file.url }}" 
           download
           class="px-10 py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl text-xl font-semibold flex items-center gap-4 transition-all hover:scale-105 shadow-lg shadow-blue-500/30">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M4 16v-4m0 0l4 4m-4-4l4-4m12 0v4m0 0l-4-4m4 4l-4 4"></path>
          </svg>
          TẢI XUỐNG NGAY
        </a>
      </div>
    </object>
  </div>
</div>
{% endblock %}
