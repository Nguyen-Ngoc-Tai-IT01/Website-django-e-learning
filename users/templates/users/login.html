{% extends 'base.html' %} {% block title %}Đăng nhập | Tài Platform{% endblock%} {% block content %}
<div
  class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 -mt-10"
>
  <div
    class="absolute w-[500px] h-[500px] bg-blue-600/10 blur-[100px] rounded-full pointer-events-none"
  ></div>

  <div
    class="max-w-md w-full space-y-8 bg-slate-800/40 backdrop-blur-xl p-10 rounded-3xl border border-slate-700/50 shadow-2xl relative z-10"
  >
    <div>
      <div
        class="w-12 h-12 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-xl mx-auto flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20 text-2xl"
      >
        T
      </div>
      <h2
        class="mt-6 text-center text-3xl font-extrabold text-white tracking-tight"
      >
        Chào mừng trở lại
      </h2>
      <p class="mt-2 text-center text-sm text-slate-400">
        Chưa có tài khoản?
        <a
          href="{% url 'users:register' %}"
          class="font-medium text-blue-400 hover:text-blue-300 transition"
          >Đăng ký ngay</a
        >
      </p>
    </div>

    <form class="mt-8 space-y-6" action="#" method="POST">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label
            for="username"
            class="block text-sm font-medium text-slate-300 mb-1"
            >Tên đăng nhập</label
          >
          <input
            id="username"
            name="username"
            type="text"
            required
            value="{{ old_username|default:'' }}"
            class="appearance-none relative block w-full px-4 py-3 border border-slate-600 bg-slate-900/50 placeholder-slate-500 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-slate-900 sm:text-sm transition-all"
            placeholder="Nhập tên đăng nhập"
          />
        </div>
        <div>
          <label
            for="password"
            class="block text-sm font-medium text-slate-300 mb-1"
            >Mật khẩu</label
          >
          <input
            id="password"
            name="password"
            type="password"
            required
            class="appearance-none relative block w-full px-4 py-3 border border-slate-600 bg-slate-900/50 placeholder-slate-500 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-slate-900 sm:text-sm transition-all"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input
            id="remember-me"
            name="remember-me"
            type="checkbox"
            class="h-4 w-4 text-blue-500 focus:ring-blue-500 border-slate-600 bg-slate-900 rounded cursor-pointer"
          />
          <label
            for="remember-me"
            class="ml-2 block text-sm text-slate-400 cursor-pointer"
            >Ghi nhớ đăng nhập</label
          >
        </div>
        <div class="text-sm">
          <a
            href="#"
            class="font-medium text-blue-400 hover:text-blue-300 transition"
            >Quên mật khẩu?</a
          >
        </div>
      </div>

      <div>
        <button
          type="submit"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-slate-900 shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all"
        >
          Đăng nhập hệ thống
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
